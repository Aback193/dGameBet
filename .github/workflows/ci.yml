name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts-lint:
    name: Lint Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Install dependencies
        working-directory: ./contracts
        run: forge install OpenZeppelin/openzeppelin-contracts --no-git
      - name: Check formatting
        working-directory: ./contracts
        run: forge fmt --check

  contracts-test:
    name: Test Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Install dependencies
        working-directory: ./contracts
        run: forge install OpenZeppelin/openzeppelin-contracts --no-git
      - name: Run tests
        working-directory: ./contracts
        run: rm -rf cache/fuzz/failures 2>/dev/null; forge test -vvv
      - name: Run coverage
        working-directory: ./contracts
        run: rm -rf cache/fuzz/failures 2>/dev/null; forge coverage --report lcov
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./contracts/lcov.info
          flags: contracts

  backend-lint:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      - name: Run linter
        working-directory: ./backend
        run: npm run lint

  backend-test:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dgamebet
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dgamebet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      - name: Run migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://dgamebet:test@localhost:5432/dgamebet_test
        run: npm run db:migrate
      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://dgamebet:test@localhost:5432/dgamebet_test
          REDIS_URL: redis://localhost:6379
        run: npm run test:coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage/lcov.info
          flags: backend

  backend-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dgamebet
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dgamebet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      - name: Run migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://dgamebet:test@localhost:5432/dgamebet_test
        run: npm run db:migrate
      - name: Run integration tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://dgamebet:test@localhost:5432/dgamebet_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: npm run test:integration

  frontend-lint:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Run linter
        working-directory: ./frontend
        run: npm run lint

  frontend-test:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Run tests
        working-directory: ./frontend
        run: npm run test:coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dgamebet
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dgamebet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      - name: Run migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://dgamebet:test@localhost:5432/dgamebet_test
        run: npm run db:migrate
      - name: Start backend
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://dgamebet:test@localhost:5432/dgamebet_test
          REDIS_URL: redis://localhost:6379
          PORT: "3001"
          NODE_ENV: test
        run: npm run dev &
      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && break || sleep 2
          done
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_CHAIN_ID: "11155111"
        run: npx playwright test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  build:
    name: Build All
    runs-on: ubuntu-latest
    needs:
      [
        contracts-lint,
        contracts-test,
        backend-lint,
        backend-test,
        backend-integration,
        frontend-lint,
        frontend-test,
        e2e-test,
      ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build contracts
        uses: docker/build-push-action@v5
        with:
          context: ./contracts
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
